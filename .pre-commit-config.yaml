repos:
  - repo: local
    hooks:
      - id: lint
        name: ESLint
        entry: npm run lint
        language: system
        files: \.ts$
        pass_filenames: false

      - id: typecheck
        name: TypeScript
        entry: npm run typecheck
        language: system
        files: \.ts$
        pass_filenames: false

      - id: prettier
        name: Prettier
        entry: npx prettier --write
        language: system
        files: \.(ts|html|css|json)$
        pass_filenames: true
