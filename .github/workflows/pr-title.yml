name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Validate PR title
        # The title is passed via env, never interpolated into the shell, so a
        # crafted title can't inject commands. The check is a committed,
        # zero-dependency script — no third-party Action in the loop.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-title.ts
